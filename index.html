    .gradient-bg {

      inset: 0;
      border-radius: inherit;
      padding: 1px;

      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

      mask-composite: exclude;

  </style>
</head>

                    <div className={`ml-12 md:ml-0 md:w-1/2 ${index % 2 === 0 ? 'md:pr-12' : 'md:pl-12'}`}>
                      <div className="glass rounded-2xl p-6 hover-lift card-shine">
                        <div className="flex items-start justify-between mb-3">
                          <h3 className="text-lg font-semibold text-white">{edu.degree}</h3>
                          <span className="px-3 py-1 rounded-full text-xs font-medium bg-fuchsia-500/20 text-fuchsia-400">{edu.status}</span>
                        </div>
                        <p className="text-fuchsia-400 font-medium mb-1">{edu.institute}</p>
                        <p className="text-zinc-500 text-sm mb-2">{edu.location}</p>
                        <p className="text-lime-400 text-sm font-medium">{edu.description}</p>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const Certifications = () => {
      const sectionRef = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
          });
        }, { threshold: 0.1 });

        const elements = sectionRef.current.querySelectorAll('.reveal');
        elements.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);

      return (
        <section id="certifications" ref={sectionRef} className="py-24 relative">
          <div className="blob w-72 h-72 bg-lime-600 top-1/2 right-0"></div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div className="text-center mb-16 reveal">
              <h2 className="text-3xl sm:text-4xl font-bold text-white mb-4">My <span className="gradient-text">Certifications</span></h2>
              <div className="w-20 h-1 bg-gradient-to-r from-fuchsia-500 to-sky-500 mx-auto rounded-full"></div>
              <p className="text-zinc-500 mt-4 max-w-2xl mx-auto">Professional certifications that validate my expertise</p>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              {studentData.certifications.map((cert, index) => (
                <div key={index} className="reveal glass rounded-2xl p-6 hover-lift card-shine" style={{ transitionDelay: `${index * 0.2}s` }}>
                  <div className="flex items-start gap-4">
                    <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-fuchsia-500 to-sky-500 flex items-center justify-center text-2xl shrink-0">
                      🏆
                    </div>
                    <div className="flex-1">
                      <h3 className="text-lg font-semibold text-white mb-2">{cert.name}</h3>
                      <div className="flex flex-wrap items-center gap-3 mb-3">
                        <span className="text-fuchsia-400 text-sm">{cert.platform}</span>
                        <span className="text-zinc-600">•</span>
                        <span className="text-zinc-500 text-sm">{cert.date}</span>
                      </div>
                      <div className="flex flex-wrap gap-2 mb-4">
                        {cert.skills.map(skill => (
                          <span key={skill} className="px-2 py-1 glass rounded text-xs text-zinc-400">{skill}</span>
                        ))}
                      </div>
                      <a href={cert.verification} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-sm text-sky-400 hover:text-sky-300 transition-colors">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        View Certificate
                      </a>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const CTA = () => {
      return (
        <section className="py-24 relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-r from-fuchsia-600/20 via-transparent to-sky-600/20"></div>

          <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
            <div className="glass-strong rounded-3xl p-12 glow-purple">
              <div className="inline-flex items-center gap-2 bg-lime-500/20 px-4 py-2 rounded-full mb-6">
                <span className="w-2 h-2 rounded-full bg-lime-400 status-dot"></span>
                <span className="text-sm text-lime-400">{studentData.availability}</span>
              </div>

              <h2 className="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mb-4">{studentData.ctaMessage}</h2>
              <p className="text-zinc-400 text-lg mb-8 max-w-2xl mx-auto">
                I'm currently looking for new opportunities. Whether you have a project in mind or just want to chat, feel free to reach out!
              </p>

              <div className="flex flex-wrap items-center justify-center gap-4">
                <a href="#contact" className="btn-primary px-8 py-4 rounded-xl text-white font-medium text-lg">
                  Contact Me
                </a>
                <a href={studentData.resumeUrl} target="_blank" rel="noopener noreferrer" className="btn-outline px-8 py-4 rounded-xl text-white font-medium text-lg flex items-center gap-2">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  Download CV
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    };

    const Contact = () => {
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const [sending, setSending] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSending(true);
        setError('');
        try {
          const response = await fetch('https://formspree.io/f/xdaponyp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ name: formData.name, email: formData.email, message: formData.message }),
          });
          if (response.ok) {
            setSubmitted(true);
            setFormData({ name: '', email: '', message: '' });
            setTimeout(() => setSubmitted(false), 5000);
          } else {
            const data = await response.json();
            setError(data.errors ? data.errors.map(err => err.message).join(', ') : 'Something went wrong. Please try again.');
          }
        } catch (err) {
          setError('Network error. Please check your connection and try again.');
        } finally {
          setSending(false);
        }
      };

      return (
        <section id="contact" className="py-24 relative">
          <div className="blob w-72 h-72 bg-fuchsia-600 top-0 left-1/4"></div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div className="text-center mb-16">
              <h2 className="text-3xl sm:text-4xl font-bold text-white mb-4">Get in <span className="gradient-text">Touch</span></h2>
              <div className="w-20 h-1 bg-gradient-to-r from-fuchsia-500 to-sky-500 mx-auto rounded-full"></div>
            </div>

            <div className="grid lg:grid-cols-2 gap-12">
              <div>
                <h3 className="text-2xl font-semibold text-white mb-6">Let's Connect</h3>
                <p className="text-zinc-400 mb-8">Have a project in mind or just want to say hi? I'd love to hear from you. Fill out the form and I'll get back to you as soon as possible.</p>

                <div className="space-y-6">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-fuchsia-500/20 to-sky-500/20 flex items-center justify-center">
                      <svg className="w-5 h-5 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                      </svg>
                    </div>
                    <div>
                      <div className="text-zinc-500 text-sm">Email</div>
                      <a href={`mailto:${studentData.email}`} className="text-white hover:text-fuchsia-400 transition-colors">{studentData.email}</a>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-fuchsia-500/20 to-sky-500/20 flex items-center justify-center">
                      <svg className="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                      </svg>
                    </div>
                    <div>
                      <div className="text-zinc-500 text-sm">Location</div>
                      <div className="text-white">{studentData.location}</div>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-fuchsia-500/20 to-sky-500/20 flex items-center justify-center">
                      <svg className="w-5 h-5 text-lime-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                      </svg>
                    </div>
                    <div>
                      <div className="text-zinc-500 text-sm">LinkedIn</div>
                      <a href={studentData.socials.linkedin} target="_blank" rel="noopener noreferrer" className="text-white hover:text-fuchsia-400 transition-colors">Connect with me</a>
                    </div>
                  </div>
                </div>
              </div>

              <div className="glass rounded-2xl p-8">
                {submitted ? (
                  <div className="text-center py-12">
                    <div className="w-16 h-16 rounded-full bg-lime-500/20 flex items-center justify-center mx-auto mb-4">
                      <svg className="w-8 h-8 text-lime-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                      </svg>
                    </div>
                    <h3 className="text-xl font-semibold text-white mb-2">Message Sent!</h3>
                    <p className="text-zinc-400">Thank you for reaching out. I'll get back to you soon!</p>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit} className="space-y-6">
                    <div>
                      <label className="block text-zinc-400 text-sm mb-2">Your Name</label>
                      <input type="text" required value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full px-4 py-3 glass rounded-xl bg-transparent text-white border border-white/10 focus:border-fuchsia-500 focus:outline-none transition-colors" placeholder="Pavan Hegade" />
                    </div>

                    <div>
                      <label className="block text-zinc-400 text-sm mb-2">Your Email</label>
                      <input type="email" required value={formData.email} onChange={(e) => setFormData({ ...formData, email: e.target.value })} className="w-full px-4 py-3 glass rounded-xl bg-transparent text-white border border-white/10 focus:border-fuchsia-500 focus:outline-none transition-colors" placeholder="pavanhegade06@gmail.com" />
                    </div>

                    <div>
                      <label className="block text-zinc-400 text-sm mb-2">Message</label>
                      <textarea required rows={4} value={formData.message} onChange={(e) => setFormData({ ...formData, message: e.target.value })} className="w-full px-4 py-3 glass rounded-xl bg-transparent text-white border border-white/10 focus:border-fuchsia-500 focus:outline-none transition-colors resize-none" placeholder="Write your message here..."></textarea>
                    </div>

                    {error && (
                      <div className="px-4 py-3 rounded-xl bg-rose-500/20 border border-rose-500/30 text-rose-400 text-sm">
                        ⚠️ {error}
                      </div>
                    )}

                    <button type="submit" disabled={sending} className={`w-full btn-primary py-4 rounded-xl text-white font-medium text-lg flex items-center justify-center gap-2 ${sending ? 'opacity-60 cursor-not-allowed' : ''}`}>
                      {sending ? (
                        <>
                          <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                          </svg>
                          Sending...
                        </>
                      ) : (
                        <>
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                          </svg>
                          Send Message
                        </>
                      )}
                    </button>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    };

    const Footer = () => {
      return (
        <footer className="py-8 border-t border-white/10">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="ph-logo ph-logo-pulse w-10 h-10 rounded-xl bg-gradient-to-br from-fuchsia-500 to-sky-500 flex items-center justify-center text-white font-bold text-sm">
                  {studentData.initials}
                </div>
                <span className="text-zinc-400">© {new Date().getFullYear()} {studentData.name}. All rights reserved.</span>
              </div>

              <div className="flex items-center gap-6">
                <a href={studentData.socials.linkedin} target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-fuchsia-400 transition-colors">
                  <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                  </svg>
                </a>
                <a href={studentData.socials.github} target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-fuchsia-400 transition-colors">
                  <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                  </svg>
                </a>
                <a href={`mailto:${studentData.email}`} className="text-zinc-500 hover:text-fuchsia-400 transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </footer>
      );
    };

    const App = () => {
      return (
        <div className="gradient-bg min-h-screen">
          <Navbar />
          <Hero />
          <About />
          <Skills />
          <Experience />
          <Projects />
          <Education />
          <Certifications />
          <CTA />
          <Contact />
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
